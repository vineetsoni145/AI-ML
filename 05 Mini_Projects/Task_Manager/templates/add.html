<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Task</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #e5e7eb;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      form {
        width: 420px;
        background-color: white;
        padding: 35px;
        border-radius: 14px;
        box-shadow: 0px 4px 14px rgba(0, 0, 0, 0.15);
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #1f2937;
        font-size: 42px;
      }

      label {
        font-weight: bold;
        color: #374151;
      }

      input[type="text"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        margin-top: 8px;
        margin-bottom: 22px;
        font-size: 15px;
        outline: none;
      }

      input[type="text"]:focus {
        border-color: #2563eb;
      }

      input[type="radio"] {
        margin-top: 15px;
        margin-right: 8px;
      }

      button {
        width: 100%;
        margin-top: 28px;
        padding: 13px;
        background-color: #1677ee;
        color: white;
        border: none;
        border-radius: 7px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background-color: #0f5ec4;
      }
    </style>
  </head>

  <body>
    <form action="/add" method="POST">
      <h1>Add Task</h1>

      <label for="addt">TASK NAME :</label><br />
      <input type="text" name="taskname" id="addt" />

      <label for="taskdet">TASK DETAIL :</label><br />
      <input type="text" name="taskdetail" id="taskdet" />

      <label>TASK STATUS :</label><br />

      <input type="radio" name="taskstatus" value="active" id="active" />
      <label for="active">Active</label><br />

      <input type="radio" name="taskstatus" value="pending" id="pending" />
      <label for="pending">Pending</label><br />

      <input type="radio" name="taskstatus" value="completed" id="completed" />
      <label for="completed">Completed</label><br />

      <button type="submit">Add Task</button>
      <br /><br />

      <a href="/view">
        <button type="button">View Tasks</button>
      </a>
    </form>
  </body>
</html>
