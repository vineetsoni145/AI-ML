  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>flask app</title>

      <style>
        h2 {
          font-size: larger;
          color: brown;
        }

        label {
          font-size: x-large;
          font-style: italic;
        }

        button {
          border: burlywood 2px solid;
          border-radius: 10px;
          padding: 5px 20px 5px 20px;
        }

        .box {
          width: 200px;
          height: 200px;
          border: 2px solid black;
          margin-top: 20px;
          background-color: {{ color }};
        } 
      </style>
    </head>

    <body>
      <form action="/" method="post">
        <h1>Personal Detail Form</h1>

        <label for="username">UserName : </label><br />

        <input
          type="text"
          id="username"
          name="username"
          placeholder="enter your username"
          required
        /><br />

        <br><label for="pass">Password : </label><br>
        <input type="password" id="ps" name="pass" placeholder="enter your password" required/></br>

        <br><label for="age">Birth year : </label><br>
        <input type="number" id="br" name="br" placeholder="enter your birth year  " required></br>

        <br /><button type="submit">Submit</button>
      </form>
      <div class="box"></div>

      <p>Your age is : {{age}}</p>
    </body>
  </html>
</html>
