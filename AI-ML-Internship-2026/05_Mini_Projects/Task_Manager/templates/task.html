<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #e5e7eb;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      form {
        background-color: white;
        width: 380px;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #1f2937;
        font-size: 40px;
      }

      input[type="radio"] {
        margin-right: 10px;
        margin-bottom: 18px;
      }

      label {
        font-size: 18px;
        font-weight: 600;
        color: #374151;
      }

      input[type="submit"] {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background-color: #1677ee;
        color: white;
        border: none;
        border-radius: 7px;
        font-size: 17px;
        cursor: pointer;
        transition: 0.3s;
      }

      input[type="submit"]:hover {
        background-color: #0f5ec4;
      }
    </style>
  </head>

  <body>
    <form action="/" method="POST">
      <h1>Task Manager</h1>

      <input type="radio" name="option" id="option1" value="add" />
      <label for="option1">Add</label>
      <br />

      <input type="radio" name="option" id="option2" value="delete" />
      <label for="option2">Delete</label>
      <br />

      <input type="radio" name="option" id="option3" value="update" />
      <label for="option3">Update</label>
      <br />

      <input type="radio" name="option" id="option4" value="view" />
      <label for="option4">View</label>
      <br />

      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
