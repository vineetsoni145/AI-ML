<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Customer Data</title>
    <style>
      body {
        background-color: #f2f2f2;
        font-family: Arial;
        text-align: center;
        margin-top: 100px;
      }

      form {
        background-color: white;
        width: 350px;
        height: 300px;
        margin: auto;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
      }

      h1 {
        color: darkblue;
      }

      label {
        font-size: 18px;
      }

      input[type="text"] {
        width: 90%;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 20px;
        border: 1px solid gray;
        border-radius: 5px;
      }

      input[type="radio"] {
        margin-top: 15px;
      }

      button {
        background-color: darkblue;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        margin-top: 20px;
        cursor: pointer;
      }

      button:hover {
        background-color: blue;
      }

      h2 {
        margin-top: 30px;
        color: green;
      }

      p {
        font-size: 22px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>Access Customer Data</h1>

    <form action="/" method="post">
      <label>Enter Tier Type :</label>
      <input type="text" name="loyalty" required />
      <br /><br />

      <label>Gender :</label>
      <input type="radio" name="gender" value="Male" required />
      <label>Male</label>
      <input type="radio" name="gender" value="Female" required />
      <label>Female</label>
      <br /><br />

      <button type="submit">Search</button>
      <p>Result : {{ loyalty }}</p>
    </form>
  </body>
</html>
