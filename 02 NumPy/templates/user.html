<!doctype html>
<html>
  <head>
    <title>CSV Dashboard</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
      }

      .header {
        background: #1e3a8a;
        color: white;
        padding: 20px;
        text-align: center;
      }

      .container {
        width: 90%;
        margin: auto;
        margin-top: 30px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0px 0px 10px lightgray;
      }

      input {
        padding: 10px;
        width: 250px;
        margin-top: 10px;
      }

      button {
        padding: 10px 20px;
        border: none;
        background: #2563eb;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        margin: 5px;
      }

      button:hover {
        background: #1d4ed8;
      }

      .stats {
        display: flex;
        gap: 20px;
      }

      .box {
        flex: 1;
        background: #dbeafe;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
      }

      h2 {
        margin-top: 0;
      }

      .result {
        color: green;
        font-size: 22px;
      }

      .error {
        color: red;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>CSV Dashboard</h1>
    </div>

    <div class="container">
      <div class="card">
        <form method="POST" enctype="multipart/form-data">
          <input type="file" name="csv_file" />
          <button type="submit">Upload CSV</button>
        </form>
      </div>

      {% if rows %}

      <div class="stats">
        <div class="box">
          <h2>Total Rows</h2>
          <h1>{{ rows }}</h1>
        </div>

        <div class="box">
          <h2>Total Columns</h2>
          <h1>{{ cols }}</h1>
        </div>
      </div>

      <div class="card">
        <h2>Available Columns</h2>

        {% for col in columns %}
        <button disabled>{{ col }}</button>
        {% endfor %}
      </div>

      <div class="card">
        <h2>Calculate Sum & Average</h2>

        <form method="POST">
          <input type="text" name="column" placeholder="Enter Column Name" />
          <br /><br />
          <button type="submit" name="calculation" value="sum">Sum</button>
          <button type="submit" name="calculation" value="avg">Average</button>
        </form>
      </div>

      {% endif %} {% if result %}
      <h2 class="result">Result : {{ result }}</h2>
      {% endif %} {% if error %}
      <h3 class="error">{{ error }}</h3>
      {% endif %}
    </div>
  </body>
</html>
